name: OmniWarehouse CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install numpy matplotlib scipy numba pytest
        pip install torch --index-url https://download.pytorch.org/whl/cpu
        pip install -e .
    
    - name: Lint with flake8
      run: |
        pip install flake8
        flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 src/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Format check with black
      run: |
        pip install black
        black --check src/
    
    - name: Run unit tests
      run: |
        pytest tests/ -v
    
    - name: Run integration demo (planning module)
      run: |
        python demo_integration.py --mode planning
    
    - name: Run integration demo (supply_chain module)
      run: |
        python demo_integration.py --mode supply_chain
    
    - name: Run integration demo (coordination module)
      run: |
        python demo_integration.py --mode coordination

  build-passing-badge:
    runs-on: ubuntu-latest
    needs: test
    if: always()
    steps:
    - name: Report status
      run: echo "CI pipeline completed"
